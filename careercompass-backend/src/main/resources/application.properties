# --- Server ----
server.port=${PORT:8080}
server.forward-headers-strategy=framework
# --- MySQL Database ----
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/careercompass_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# --- JPA/ Hibernate ----
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# ── JWT (placeholder — used from Day 2 onwards) ─────────────────────
app.jwt.secret=${APP_JWT_SECRET}
app.jwt.expiration-ms=${APP_JWT_EXPIRATION_MS}

# ── Swagger ─────────────────────────────────────────────────────────
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# ── Gemini AI ────────────────────────────────────────────────────────
gemini.api.key=${GEMINI_API_KEY}
gemini.api.url=${GEMINI_API_URL}

